name: Verify

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Prisma loads the datasource while generating the client, but this
      # verification job does not connect to a database.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/anthon_ci

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Resolve Bun cache directory
        id: bun-cache
        run: echo "dir=$(bun pm cache)" >> "$GITHUB_OUTPUT"

      - name: Restore Bun cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.bun-cache.outputs.dir }}
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify
        run: bun run verify
