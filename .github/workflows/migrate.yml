name: Apply database migrations

on:
  workflow_dispatch:
    inputs:
      target:
        description: Database environment to migrate
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

permissions:
  contents: read

# One migration owner per target database. Do not cancel an in-flight run: the
# next queued run must observe the schema created by the previous one.
concurrency:
  group: prisma-migrations-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  migrate:
    name: Migrate ${{ inputs.target }} database
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: ${{ inputs.target }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply pending migrations
        env:
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
          MIGRATION_DEPLOYMENT: "true"
          MIGRATION_ENVIRONMENT: ${{ inputs.target }}
        run: bun run migrate:deploy
